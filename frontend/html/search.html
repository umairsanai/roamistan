<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roamistan · Search results</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/navbar.css">
  <link rel="stylesheet" href="../css/search.css">
  <link rel="stylesheet" href="../css/location-not-found.css">
  <link rel="stylesheet" href="../css/error.css">
  <link rel="icon" type="image/png" href="../assets/roamistan-logo.png">
</head>
<body>
  <div class="search-page-shell not-found-page-shell">
    <div class="search-content not-found-content">
      <!-- main -->
      <main class="container main-grid">
        <section style="flex:1;">
          <div class="card-grid"></div>
          <!-- pagination -->
          <div class="pagination">
            <button class="page-btn page-prev"><span class="material-symbols-outlined">chevron_left</span></button>
            <button class="page-btn page-next"><span class="material-symbols-outlined">chevron_right</span></button>
          </div>
        </section>
      </main>
    </div>

    <aside class="not-found-card hidden" aria-live="polite">
      <div class="not-found-icon-wrap">
        <span class="material-symbols-outlined not-found-icon">search_off</span>
      </div>
      <p class="not-found-kicker">No matches</p>
      <h2>No location found</h2>
      <p class="not-found-copy">
        We could not find any destinations matching your search. Try a different place name, region, or spelling.
      </p>
      <div class="not-found-hint">
        <span class="material-symbols-outlined">travel_explore</span>
        <span>Adjust your search and explore another destination.</span>
      </div>
    </aside>
  </div>
  <script type="module" src="../src/search.ts"></script>
  <script type="module" src="../src/navbar.ts"></script>
</body>
</html>
