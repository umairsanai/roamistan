<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roamistan · Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600&family=Montserrat:wght@400;600;700&display=swap"/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link rel="stylesheet" href="../css/auth.css" />
  <link rel="stylesheet" href="../css/error.css" />
</head>
<body>
  <!-- Blurred Background -->
  <div class="bg-blur-wrap">
    <div class="bg-blur-image"></div>
    <div class="bg-overlay"></div>
  </div>

  <!-- Card -->
  <main class="card-wrapper">
    <div class="card">
      <!-- Header / Toggle -->
      <div class="card-header">
        <div class="brand-row">
          <span class="material-symbols-outlined brand-icon">landscape</span>
          <h1 class="brand-title">Roamistan</h1>
        </div>
        <div class="toggle-group">
          <div class="toggle-indicator" id="toggleIndicator"></div>
          <button class="toggle-btn active" id="btnLogin">Login</button>
          <button class="toggle-btn" id="btnSignup">Signup</button>
        </div>
      </div>

      <!-- Forms -->
      <div class="card-body">
        <!-- Login -->
        <form class="form" id="formLogin">
          <div class="input-stack">
            <div class="input-field">
              <label for="loginEmail">Email Address</label>
              <div class="input-icon-wrap">
                <span class="material-symbols-outlined input-icon">mail</span>
                <input type="email" id="loginEmail" placeholder="you@example.com" />
              </div>
            </div>
            <div class="input-field">
              <div class="label-row">
                <label for="loginPassword">Password</label>
              </div>
              <div class="input-icon-wrap">
                <span class="material-symbols-outlined input-icon">lock</span>
                <input type="password" id="loginPassword" placeholder="••••••••" />
              </div>
            </div>
          </div>
          <button type="button" class="btn-primary login-submit-btn">
            Sign In <span class="material-symbols-outlined">arrow_forward</span>
          </button>

          <!-- Divider -->
          <div class="divider">
            <span class="line"></span>
            <span class="divider-text">OR</span>
            <span class="line"></span>
          </div>

          <!-- OAuth -->
          <div class="oauth-stack">
            <button type="button" class="btn-oauth" aria-label="Continue with Google">
              <img class="google-logo" src="../assets/google-logo.png" alt="" />
              <span>Continue with Google</span>
            </button>
          </div>
        </form>

        <!-- Signup (hidden) -->
        <form class="form hidden" id="formSignup">
          <div class="input-stack">
            <div class="input-field">
              <label for="signupName">Full Name</label>
              <div class="input-icon-wrap">
                <span class="material-symbols-outlined input-icon">person</span>
                <input type="text" id="signupName" placeholder="John Doe" />
              </div>
            </div>
            <div class="input-field">
              <label for="signupEmail">Email Address</label>
              <div class="input-icon-wrap">
                <span class="material-symbols-outlined input-icon">mail</span>
                <input type="email" id="signupEmail" placeholder="you@example.com" />
              </div>
            </div>
            <div class="input-field">
              <label for="signupCity">City</label>
              <div class="input-icon-wrap select-wrap custom-select" data-select="city">
                <span class="material-symbols-outlined input-icon">location_city</span>
                <button type="button" class="select-trigger" id="signupCity" aria-haspopup="listbox" aria-expanded="false">
                  <span class="select-value select-placeholder">Select your city</span>
                  <span class="material-symbols-outlined select-chevron">expand_more</span>
                </button>
                <input type="hidden" name="city" />
                <div class="select-menu" role="listbox" aria-label="City options">
                  <button type="button" class="select-option" role="option" data-value="Hala">Hala</button>
                  <button type="button" class="select-option" role="option" data-value="Hyderabad">Hyderabad</button>
                  <button type="button" class="select-option" role="option" data-value="Karachi">Karachi</button>
                  <button type="button" class="select-option" role="option" data-value="Lahore">Lahore</button>
                  <button type="button" class="select-option" role="option" data-value="Islamabad">Islamabad</button>
                  <button type="button" class="select-option" role="option" data-value="Rawalpindi">Rawalpindi</button>
                  <button type="button" class="select-option" role="option" data-value="Faisalabad">Faisalabad</button>
                  <button type="button" class="select-option" role="option" data-value="Multan">Multan</button>
                  <button type="button" class="select-option" role="option" data-value="Peshawar">Peshawar</button>
                  <button type="button" class="select-option" role="option" data-value="Quetta">Quetta</button>
                  <button type="button" class="select-option" role="option" data-value="Sukkur">Sukkur</button>
                  <button type="button" class="select-option" role="option" data-value="Sialkot">Sialkot</button>
                  <button type="button" class="select-option" role="option" data-value="Bahawalpur">Bahawalpur</button>
                  <button type="button" class="select-option" role="option" data-value="Gujranwala">Gujranwala</button>
                  <button type="button" class="select-option" role="option" data-value="Abbottabad">Abbottabad</button>
                  <button type="button" class="select-option" role="option" data-value="Mardan">Mardan</button>
                </div>
              </div>
            </div>
            <div class="input-field">
              <label for="signupCountry">Country</label>
              <div class="input-icon-wrap select-wrap custom-select" data-select="country">
                <span class="material-symbols-outlined input-icon">public</span>
                <button type="button" class="select-trigger" id="signupCountry" aria-haspopup="listbox" aria-expanded="false">
                  <span class="select-value select-placeholder">Select your country</span>
                  <span class="material-symbols-outlined select-chevron">expand_more</span>
                </button>
                <input type="hidden" name="country" />
                <div class="select-menu" role="listbox" aria-label="Country options">
                  <button type="button" class="select-option" role="option" data-value="Pakistan">Pakistan</button>
                  <button type="button" class="select-option" role="option" data-value="India">India</button>
                  <button type="button" class="select-option" role="option" data-value="Bangladesh">Bangladesh</button>
                  <button type="button" class="select-option" role="option" data-value="United Arab Emirates">United Arab Emirates</button>
                  <button type="button" class="select-option" role="option" data-value="Saudi Arabia">Saudi Arabia</button>
                  <button type="button" class="select-option" role="option" data-value="Turkey">Turkey</button>
                  <button type="button" class="select-option" role="option" data-value="Malaysia">Malaysia</button>
                  <button type="button" class="select-option" role="option" data-value="Indonesia">Indonesia</button>
                  <button type="button" class="select-option" role="option" data-value="United Kingdom">United Kingdom</button>
                  <button type="button" class="select-option" role="option" data-value="United States">United States</button>
                  <button type="button" class="select-option" role="option" data-value="Canada">Canada</button>
                  <button type="button" class="select-option" role="option" data-value="Australia">Australia</button>
                  <button type="button" class="select-option" role="option" data-value="Germany">Germany</button>
                  <button type="button" class="select-option" role="option" data-value="France">France</button>
                  <button type="button" class="select-option" role="option" data-value="Italy">Italy</button>
                </div>
              </div>
            </div>
            <div class="input-field">
              <label for="signupPassword">Password</label>
              <div class="input-icon-wrap">
                <span class="material-symbols-outlined input-icon">lock</span>
                <input type="password" id="signupPassword" placeholder="Create a password" />
              </div>
            </div>
          </div>
          <button type="button" class="btn-primary signup-submit-btn">
            Create Account <span class="material-symbols-outlined">person_add</span>
          </button>
        </form>
      </div>

      <!-- Footer -->
      <div class="card-footer">
        <p class="footer-text">
          By proceeding, you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.
        </p>
      </div>
    </div>
  </main>
  <script type="module" src="../src/auth.ts"></script>
</body>
</html>
