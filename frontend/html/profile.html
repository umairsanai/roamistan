<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile · Roamistan</title>
  <!-- Google Fonts & Material Symbols (kept as CDN) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap">
  <link rel="stylesheet" href="../css/navbar.css">
  <link rel="stylesheet" href="../css/profile.css">
  <style>
  </style>
</head>
<body>
  <!-- ===== TOP NAVBAR ===== -->
  <header class="top-nav">
    <div class="nav-inner">
      <div class="nav-brand-group">
        <div class="brand">
          <span class="material-symbols-outlined">landscape</span>
          Roamistan
        </div>
        <div class="search-desktop">
          <span class="material-symbols-outlined">search</span>
          <input class="nav-search-bar" placeholder="Search destinations or tours..." type="text">
        </div>
      </div>
      <div class="nav-actions-group">
        <div class="nav-divider"></div>
        <div class="nav-actions">
          <button class="profile-btn"><span class="material-symbols-outlined">person</span> Profile</button>
          <button class="logout-btn"><span class="material-symbols-outlined">logout</span> Logout</button>
        </div>
        <button class="mobile-menu-btn" aria-label="menu">
          <span class="material-symbols-outlined">menu</span>
        </button>
      </div>
    </div>
  </header>

  <!-- ====== MAIN DASHBOARD ====== -->
  <main class="dashboard">

    <!-- LEFT COLUMN -->
    <aside class="left-col" style="display:flex; flex-direction:column; gap:1.5rem; width:100%;">
      <!-- Profile card -->
      <div class="profile-card">
        <div class="avatar">
          <img class="profile-img" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCfFsdb_LooeF6qHcqlfpMFOTWermM7bZTUbHUD0pHV2E40ptXqBTVhEMnfDjRyNkqEfa-XO9cDxDN3v8b1Pz6mKSyXSEbrC4jW5uNOLCN_hfgqaNlzhjYbVc9XAnV648AfrCptZWSUHBe6KNLIvkElBB0wD265DQ6JMwNAhoxawCZe8wyAXQw30APSqCJ0i7qL4uY2TYKywcZnJKh9n5xtXCWDKfmzsfFrBbswaOvUB-Q3FwfnUAsIfVnW--ZoUeHtuaw1kVVpNx4" alt="Aliya Khan profile">
          <button class="overlay-btn">
            <span class="material-symbols-outlined" style="font-size:1rem;">photo_camera</span>
          </button>
        </div>
        <h1 class="profile-name">Aliya Khan</h1>
        <p class="profile-email" style="color:#404a3b;">aliya.explorer@example.com</p>
        <div class="divider"></div>
        <div class="stats">
          <div>
            <div class="label">Member Since</div>
            <div class="value member-since-value">March 2023</div>
          </div>
          <div style="text-align: center;">
            <div class="label">Address</div>
            <div class="value address-value">Karachi, Pakistan</div>
          </div>
          <div style="text-align:right;">
            <div class="label">Tours Completed</div>
            <div class="value tours-completed-value">12 Virtual</div>
          </div>
        </div>
        <!-- <button class="btn-edit">
          <span class="material-symbols-outlined" style="font-size:1.25rem;">edit</span> Edit Profile
        </button> -->
      </div>
    </aside>

    <!-- RIGHT COLUMN: FAVORITES -->
    <section class="right-col" style="width:100%;">
      <div class="favorites-header">
        <div>
          <h2>Bookmarked Locations</h2>
          <p>Your curated list of destinations to explore next.</p>
        </div>
      </div>

      <div class="fav-list"></div>
    </section>
  </main>
  <script type="module" src="../src/navbar.ts"></script>
  <script type="module" src="../src/profile.ts"></script>
</body>
</html>
