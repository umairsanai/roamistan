<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile · Roamistan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap">
  <link rel="stylesheet" href="../css/navbar.css">
  <link rel="stylesheet" href="../css/profile.css">
  <link rel="stylesheet" href="../css/error.css">
  <style>
  </style>
</head>
<body>
  <!-- ====== MAIN DASHBOARD ====== -->
  <main class="dashboard">

    <!-- LEFT COLUMN -->
    <aside class="left-col" style="display:flex; flex-direction:column; gap:1.5rem; width:100%;">
      <!-- Profile card -->
      <div class="profile-card">
        <div class="avatar">
          <img class="profile-img" src="../assets/default-profile.svg" alt="Default profile avatar">
          <button class="overlay-btn" type="button">
            <span class="material-symbols-outlined" style="font-size:1rem;">photo_camera</span>
          </button>
        </div>
        <h1 class="profile-name">Aliya Khan</h1>
        <p class="profile-email" style="color:#404a3b;">aliya.explorer@example.com</p>
        <div class="divider"></div>
        <div class="stats">
          <div>
            <div class="label">Member Since</div>
            <div class="value member-since-value">March 2023</div>
          </div>
          <div style="text-align: center;">
            <div class="label">Address</div>
            <div class="value address-value">Karachi, Pakistan</div>
          </div>
          <div style="text-align:right;">
            <div class="label">Tours Completed</div>
            <div class="value tours-completed-value">12 Virtual</div>
          </div>
        </div>
      </div>
    </aside>

    <!-- RIGHT COLUMN: FAVORITES -->
    <section class="right-col" style="width:100%;">
      <div class="favorites-header">
        <div>
          <h2>Bookmarked Locations</h2>
          <p>Your curated list of destinations to explore next.</p>
        </div>
      </div>
      <div class="fav-list">
        <div class="fav-empty-state">
          <span class="material-symbols-outlined fav-empty-icon">bookmark</span>
          <h3>No bookmarks yet</h3>
          <p>Your bookmarked locations will appear here once you save them.</p>
        </div>
      </div>
    </section>
  </main>
  <input id="profilePictureInput" type="file" accept="image/*" hidden>
  <script type="module" src="../src/navbar.ts"></script>
  <script type="module" src="../src/profile.ts"></script>
</body>
</html>
