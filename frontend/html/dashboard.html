<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Roamistan · Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <link href="../css/navbar.css" rel="stylesheet" >
  <link href="../css/dashboard.css" rel="stylesheet">
  <link href="../css/skeleton.css" rel="stylesheet">
  <link href="../css/error.css" rel="stylesheet">
  <link rel="icon" type="image/png" href="../assets/roamistan-logo.png">
</head>
<body>
  <!-- MAIN -->
  <main>
    <!-- HERO -->
    <section class="hero">
      <div>
        <h1 class="font-display-lg text-on-surface">Welcome Back!</h1>
        <p class="font-body-lg text-on-surface-variant">Ready to discover the hidden gems of Pakistan?</p>
      </div>
    </section>

    <!-- FAVORITES -->
    <section>
      <div class="section-header">
        <h2 class="font-headline-lg text-on-surface">Your Favorites</h2>
        <button class="see-all">See All <span class="material-symbols-outlined">arrow_forward</span></button>
      </div>
      <div class="favorites-scroll">
      </div>
    </section>

    <!-- LOCATIONS -->
    <section>
      <div class="section-header" style="margin-bottom: 24px;">
        <h2 class="font-headline-lg text-on-surface">Locations Around You</h2>
      </div>
      <div class="locations-grid">
      </div>
    </section>

    <!-- TRENDING -->
    <section>
      <div class="section-header" style="margin-bottom: 24px;">
        <h2 class="font-headline-lg text-on-surface">Trending in Pakistan</h2>
      </div>
      <div class="trending-grid">
      </div>
    </section>
  </main>
  <script type="module" src="../src/navbar.ts"></script>
  <script type="module" src="../src/dashboard.ts"></script>
</body>
</html>
